<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>BrainTetris</title>
</head>

<body class="bg-[#ededed]">

    <div class="bg  z-[-1]">
        <img src="img/bg.jpg" class="w-full opacity-80 fixed z-[-1]">
    </div>

    <div class="head z-5 h-33 w-full bg-[#ededed] shadow-xl fixed">
        <div class="flex ">
            <img src="img/Logo.png" class="h-33 ml-10">
            <h1 class="text-[60px] mt-4 ml-2 text-[#a2ded0] font-bold cursor-pointer" onclick="home()">BrainTetris</h1>
        </div>
    </div>
    <div class="h-33 z-4 w-full"></div>

    <div class="flex justify-center align-middle m-auto">
        <h1 id="msg" class="bg-[#333] text-[#f7f7f7] text-[bold] fixed mt-10 rounded-full text-center text-[30px] w-[800px]"></h1>
    </div>
    <div class="flex">
        <div
            class="buttons flex flex-col bg-[#f7f7f7] border-2 border-[#a2ded0] gap-5 w-[500px] h-[500px] mt-30 shadow-xl rounded-lg  justify-center items-center align-middle m-auto">
            <h1
                class="fixed mt-[-400px] font-bold text-[#a2ded0] text-[40px] bg-[#ededed] w-[300px] text-center shadow-lg rounded-full border-[#a2ded0] border-2">
                BrainTetris</h1>
            <label class="font-bold text-[20px] mb-[-20px] text-[#333]">Insira seu nome de usuário!</label>
            <input type="text" id="input"
                class="w-[350px] h-[60px] shadow-lg border-[#aed5f1] border-2 rounded-lg text-center justify-center text-[#333] font-bold ">
            <button id="iniciar"
                class="w-[350px] h-[60px] text-[30px] shadow-lg font-bold cursor-pointer text-[#f7f7f7] hover:bg-[#ededed] bg-[#a2ded0] rounded-lg ">Iniciar</button>
            <button id="rank" onclick="rank()"
                class="w-[350px] h-[60px] text-[30px] font-bold shadow-lg cursor-pointer text-[#f7f7f7] hover:bg-[#ededed] bg-[#aed5f1] rounded-lg ">Ranking</button>

        </div>

        <img src="img/Logo.png" class="flex mr-40">
    </div>

    <div class="w-full h-22 bg-[#a2ded0] mt-[90px] fixed"></div>
    <script src="js/home.js"></script>

</body>

</html>
